query MonthlySessions(
    $page: Int!
    $limit: Int!
    $rateType: String!
    $search: String
    $vehicleType: VehicleType
    $subscriptionStatus: String
    $referenceDate: String
    $expiringWindowDays: Int
) {
    monthlySessions(
        page: $page
        limit: $limit
        rateType: $rateType
        search: $search
        vehicleType: $vehicleType
        subscriptionStatus: $subscriptionStatus
        referenceDate: $referenceDate
        expiringWindowDays: $expiringWindowDays
    ) {
        data {
            id
            vehicleType
            plateNumber
            enteredAt
            exitedAt
            durationMinutes
            parkingFee
            parkingState
            paymentStatus
            rateType
            includeInBIRReport
            monthlyStart
            monthlyEnd
        }
        meta {
            total
            page
            totalPages
            hasNextPage
            hasPreviousPage
            limit
        }
    }
}
