<section class="main-container pb-16">
  <h1 class="text-3xl font-medium text-text-900 mt-4">Monthly Breakdown</h1>
  <mat-form-field appearance="outline" class="w-48 mt-4">
    <mat-label>Select Month</mat-label>
    <input matInput [matDatepicker]="dp" [formControl]="dateControl">
    <mat-datepicker-toggle matIconSuffix [for]="dp"></mat-datepicker-toggle>
    <mat-datepicker #dp
      startView="year"
      (monthSelected)="setMonthAndYear($event, dp)"
      panelClass="month-picker"></mat-datepicker>
  </mat-form-field>
  
  <div class="flex items-center gap-2">
    <app-button variant="neutral" (click)="exportToCSV()">
      <lucide-angular [img]="DownloadIcon" class="w-4 h-4 mr-2"></lucide-angular> Export CSV
    </app-button>
    <app-button variant="primary" (click)="exportToPDF()">
      <lucide-angular [img]="DownloadIcon" class="w-4 h-4 mr-2"></lucide-angular> Export PDF
    </app-button>
  </div>

  <div class="mt-6 grid md:grid-cols-3 gap-6">
    <app-stat-card
      [icon]="BanknoteIcon"
      label="Total Revenue"
      [value]="totalRevenue() | peso"
    ></app-stat-card>

    <app-stat-card
      [icon]="TrendingUpIcon"
      label="Avg Daily Revenue"
      [value]="averageDailyRevenue() | peso"
      iconBgClass="bg-emerald-200 text-emerald-800"
    ></app-stat-card>

    <app-stat-card
      [icon]="CarIcon"
      label="Total Entries"
      [value]="totalEntries()"
      iconBgClass="bg-blue-200 text-blue-700"
    ></app-stat-card>
  </div>

  <div class="mt-4 grid md:grid-cols-3 gap-6">
    <app-stat-card
      [icon]="ClockIcon"
      label="Hourly Revenue"
      [value]="hourlyRevenue() | peso"
      iconBgClass="bg-emerald-200 text-emerald-800"
    ></app-stat-card>

    <app-stat-card
      [icon]="EyeIcon"
      label="Overnight Revenue"
      [value]="overnightRevenue() | peso"
      iconBgClass="bg-amber-200 text-amber-800"
    ></app-stat-card>

    <app-stat-card
      [icon]="BanknoteIcon"
      label="Monthly Availers"
      [value]="monthlyAvailersRevenue() | peso"
      iconBgClass="bg-purple-200 text-purple-800"
    ></app-stat-card>
  </div>

  <h2 class="text-2xl font-semibold mt-6">Transaction Logs</h2>
  <div class="w-full overflow-x-auto bg-white rounded-lg shadow-sm border border-slate-200 mt-2">
    <table cdk-table [dataSource]="dataSource" class="w-full border-collapse">
      <ng-container cdkColumnDef="loggedDate">
        <th cdk-header-cell *cdkHeaderCellDef class="text-left px-6 py-4 text-xs text-white whitespace-nowrap">DATE</th>
        <td cdk-cell *cdkCellDef="let element" class="px-6 py-4 text-text-600 font-bold text-sm">{{ element.loggedDate | date:'MM-dd-yyyy' }}</td>
      </ng-container>

      <ng-container cdkColumnDef="totalEntries">
        <th cdk-header-cell *cdkHeaderCellDef class="text-center px-6 py-4 text-xs text-white whitespace-nowrap">TOTAL ENTRIES</th>
        <td cdk-cell *cdkCellDef="let element" class="px-6 py-4 text-center text-text-600 text-sm">{{ element.totalEntries }}</td>
      </ng-container>

      <ng-container cdkColumnDef="totalRevenue">
        <th cdk-header-cell *cdkHeaderCellDef class="text-center px-6 py-4 text-xs text-white whitespace-nowrap">TOTAL REVENUE</th>
        <td cdk-cell *cdkCellDef="let element" class="px-6 py-4 text-center text-text-900 font-bold text-sm bg-slate-50">
          {{ element.totalRevenue | peso }}
        </td>
      </ng-container>

      <ng-container cdkColumnDef="view">
        <th cdk-header-cell *cdkHeaderCellDef class="text-right px-6 py-4 text-xs text-white whitespace-nowrap">VIEW</th>
        <td cdk-cell *cdkCellDef="let element" class="px-6 py-4 text-right text-text-600">
          <div class="flex items-center justify-end">
            <lucide-angular [img]="EyeIcon" class="w-5 h-5 hover:cursor-pointer hover:text-primary transition-colors" (click)="openReport()"></lucide-angular>
          </div>
        </td>
      </ng-container>

      <tr cdk-header-row *cdkHeaderRowDef="DISPLAYED_COLUMNS" class="bg-secondary"></tr>
      <tr cdk-row *cdkRowDef="let row; columns: DISPLAYED_COLUMNS;" class="border-b border-slate-200 hover:bg-emerald-50 transition-colors"></tr>
    </table>
  </div>

  <div class="mt-8 grid lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-semibold text-text-900 mb-4">Revenue by Vehicle Type</h2>
      <div echarts (chartInit)="onVehicleChartInit($event)" [options]="vehicleChartOptions" class="h-[300px]"></div>
    </div>
    <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-semibold text-text-900 mb-4">Daily Revenue Trend</h2>
      <div echarts (chartInit)="onMonthlyTrendChartInit($event)" [options]="monthlyTrendChartOptions" class="h-[300px]"></div>
    </div>
  </div>
</section>
