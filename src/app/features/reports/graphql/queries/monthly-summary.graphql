query GetMonthlySummary($year: Int!, $month: Int!) {
  monthlySummary(year: $year, month: $month) {
    kpis {
      totalRevenue
      averageDailyRevenue
      totalEntries
    }
    revenueByStream {
      hourly
      overnight
      monthly
    }
    revenueByVehicleType {
      car
      motorcycle
      truck
    }
    dailyLogs {
      date
      totalEntries
      totalRevenue
      revenueByStream {
        hourly
        overnight
        monthly
      }
    }
  }
}
